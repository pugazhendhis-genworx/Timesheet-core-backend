services:

  # ── Auth Postgres (used only by auth backend) ──
  db:
    image: postgres:16-alpine
    container_name: postgres_server
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: TimeIQ
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TimeIQ"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  auth_backend:
    build: ../Time_IQ_Auth_backend
    container_name: auth_Backend
    env_file:
      - ../Time_IQ_Auth_backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always
  
  core_backend:
    build: ./
    container_name: TimeIQ_core_backend
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/TimeIQ
      - SYNC_POSTGRES_DB_URL=postgresql+psycopg2://postgres:postgres@db:5432/TimeIQ
    depends_on:
      db:
        condition: service_healthy
      auth_backend:
        condition: service_started
    ports:
      - "8001:8001"
    restart: always

  frontend:
    build: ../TimeIQ-FrontEnd
    container_name: TimeIq-frontend
    depends_on:
      - auth_backend
      - core_backend
    ports:
      - "5173:5173"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: timeiq-redis-container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery-watcher:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: timeiq-celery-watcher-final
    command: celery -A src.workers.celery_app.celery_app worker -Q watcher -n watcher@%h -l info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/TimeIQ
      - SYNC_POSTGRES_DB_URL=postgresql+psycopg2://postgres:postgres@db:5432/TimeIQ
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: timeiq-celery-beat-final
    command: celery -A src.workers.celery_app.celery_app beat -l info --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/TimeIQ
      - SYNC_POSTGRES_DB_URL=postgresql+psycopg2://postgres:postgres@db:5432/TimeIQ
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    depends_on:
      - redis
    restart: unless-stopped

  celery-processor:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: timeiq-celery-processor-final
    command: celery -A src.workers.celery_app.celery_app worker -Q processor -n processor@%h -l info -c 4
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/TimeIQ
      - SYNC_POSTGRES_DB_URL=postgresql+psycopg2://postgres:postgres@db:5432/TimeIQ
    volumes:
      - .:/app
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: